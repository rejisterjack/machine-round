name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Test
        run: bun test
      - name: Build
        run: bun run build
      - name: Smoke API (health)
        run: bun run smoke:api

  smoke-authenticated:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install
      - name: Build
        run: bun run build
      - name: Start server
        run: bun run start &
      - name: Wait for server
        run: sleep 8
      - name: Authenticated smoke
        if: env.SMOKE_AUTH_COOKIE != ''
        env:
          SMOKE_BASE_URL: http://localhost:7329
          SMOKE_AUTH_COOKIE: ${{ secrets.SMOKE_AUTH_COOKIE }}
          SMOKE_AUTH_REQUIRED: "1"
        run: bun run smoke:frontend
